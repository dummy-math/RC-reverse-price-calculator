<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Reverse Calculator</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      line-height: 1.5;
    }
    input, button {
      padding: 8px;
      margin: 6px 0;
      width: 100%;
      font-size: 16px;
    }
    .result {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Reverse Price Calculator</h2>

  <label>Discounted price (integer)</label>
  <input id="discounted" type="number" step="1">

  <label>Discount percentage (e.g. 20 for 20%)</label>
  <input id="percent" type="number" step="0.1">

  <button onclick="calculate()">Calculate</button>

  <div class="result" id="output" style="display:none;"></div>

  <script>
    function reversePrice(D, r) {
      if (r < 0 || r >= 1) {
        return { error: "Discount must be between 0% and 100%." };
      }

      const lower = D / (1 - r);
      const upper = (D + 1) / (1 - r);
      const eps = 1e-9;

      const P_min = Math.ceil(lower);
      const P_max = Math.floor(upper - eps);

      const candidates = [];

      for (let P = P_min; P <= P_max; P++) {
        const x = P * (1 - r);
        if (x >= D && x < D + 1) {
          candidates.push(P);
        }
      }

      let result = {
        candidates: candidates,
        case: "",
        recommended: null
      };

      if (candidates.length === 0) {
        result.case = "invalid";
      } else if (candidates.length === 1) {
        result.case = "unique";
        result.recommended = candidates[0];
      } else if (candidates.length === 2) {
        result.case = "ambiguous";
        result.recommended = Math.max(...candidates);
      } else {
        result.case = "unexpected";
        result.recommended = Math.max(...candidates);
      }

      return result;
    }

    function calculate() {
      const D = parseInt(document.getElementById("discounted").value);
      const percent = parseFloat(document.getElementById("percent").value);

      const output = document.getElementById("output");

      if (isNaN(D) || isNaN(percent)) {
        output.style.display = "block";
        output.innerHTML = "Invalid input.";
        return;
      }

      const r = percent / 100;

      const res = reversePrice(D, r);

      if (res.error) {
        output.style.display = "block";
        output.innerHTML = res.error;
        return;
      }

      output.style.display = "block";
      output.innerHTML = `
        <div><span class="label">Candidates:</span> ${res.candidates.join(", ") || "None"}</div>
        <div><span class="label">Case:</span> ${res.case}</div>
        <div><span class="label">Recommended (no underestimation):</span> ${res.recommended ?? "—"}</div>
      `;
    }
  </script>

</body>
</html>
