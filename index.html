<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Reverse Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background-color: #f9f9f9;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;     
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 400px; 
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 1em;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      font-size: 1em;
      border-radius: 4px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      margin-top: 18px;
      background-color: #4CAF50;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .result {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f0f0f0;
      word-wrap: break-word;
      font-size: 1em;
    }

    .label {
      font-weight: bold;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Reverse Price Calculator</h2>

    <label>Discounted price</label>
    <input id="discounted" type="number" min="0" step="1" required>

    <label>Discount percentage (min 10, max 20)</label>
    <input id="percent" type="number" min="10" max="20" step="1" required>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output" style="display:none;"></div>
  </div>

  <script>
    function reversePrice(D, r) {
      const lower = D / (1 - r);
      const upper = (D + 1) / (1 - r);
      const eps = 1e-9;

      const P_min = Math.ceil(lower);
      const P_max = Math.floor(upper - eps);

      const candidates = [];

      for (let P = P_min; P <= P_max; P++) {
        const x = P * (1 - r);
        if (x >= D && x < D + 1) {
          candidates.push(P);
        }
      }

      let result = { candidates, case: "", recommended: null };

      if (candidates.length === 0) {
        result.case = "invalid";
      } else if (candidates.length === 1) {
        result.case = "unique";
        result.recommended = candidates[0];
      } else if (candidates.length === 2) {
        result.case = "ambiguous";
        result.recommended = Math.max(...candidates);
      } else {
        result.case = "unexpected";
        result.recommended = Math.max(...candidates);
      }

      return result;
    }

    function calculate() {
      const output = document.getElementById("output");

      const D_raw = document.getElementById("discounted").value;
      const percent_raw = document.getElementById("percent").value;

      const D = Number(D_raw);
      const percent = Number(percent_raw);

      if (!Number.isInteger(D) || D < 0) {
        showError("Discounted price must be a non-negative integer.");
        return;
      }

      if (!Number.isInteger(percent) || percent < 10 || percent > 20) {
        showError("Discount percentage must be an integer between 10% and 20%.");
        return;
      }

      const r = percent / 100;

      const res = reversePrice(D, r);

      output.style.display = "block";
      output.innerHTML = `
        <div><span class="label">Original price candidates:</span> ${res.candidates.join(", ") || "None"}</div>
        <div><span class="label">Recommended original price:</span> ${res.recommended ?? "—"}</div>
      `;
    }

    function showError(message) {
      const output = document.getElementById("output");
      output.style.display = "block";
      output.innerHTML = `<div class="error">${message}</div>`;
    }
  </script>

</body>
</html>
